<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Author" content="Timon Dodo">
    <title>FCOMPANION - Verify Email</title>
    <link rel="stylesheet" href="FGT PSS.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <button class="back-button" id="backButton">←</button>
            <button class="theme-toggle" id="themeToggle">
                <span id="themeIcon"><ion-icon name="moon"></ion-icon></span>
            </button>

            <div class="header">
                <div class="icon-circle">✉️</div>
                <h1 id="stepTitle">Verify Your Email</h1>
                <p id="stepDescription">We sent a 6-digit code to your email address.</p>
            </div>

            <div class="step-indicator">
                <div class="step active" id="step1"></div>
                <div class="step" id="step2"></div>
            </div>

            <!-- Step 1: OTP Input -->
            <div class="form-content active" id="codeStep">
                <form id="codeForm">
                    <div class="verification-code">
                        <input type="text" class="code-input" maxlength="1" id="code1" required>
                        <input type="text" class="code-input" maxlength="1" id="code2" required>
                        <input type="text" class="code-input" maxlength="1" id="code3" required>
                        <input type="text" class="code-input" maxlength="1" id="code4" required>
                        <input type="text" class="code-input" maxlength="1" id="code5" required>
                        <input type="text" class="code-input" maxlength="1" id="code6" required>
                    </div>
                    <div class="resend-code">
                        <a id="resendCode">Didn't receive code? Resend</a>
                    </div>
                    <button type="submit" class="submit-btn">Verify & Create Account</button>
                </form>
                <p>Do make sure to check your junk/spam mail</p>
            </div>

            <!-- Step 2: Success -->
            <div class="form-content" id="successStep">
                <div class="success-message">
                    <div class="success-icon">✓</div>
                    <h2 style="margin-bottom: 12px;">Email Verified!</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 24px;">
                        Your account has been created successfully.
                    </p>
                    <button class="submit-btn" id="goToHome">Go to Home</button>
                </div>
            </div>
        </div>
    </div>
    <script src="VerifyEmail.js"></script>
</body>
</html>
