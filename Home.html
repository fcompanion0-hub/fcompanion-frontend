<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Author" content="Timon Dodo">
    <meta name="description" content="A chatbot that helps students get accurate information Nile University's faculty of computing">
    <title>FCOMPANION - AI Learning Assistant</title>
    <link rel="stylesheet" href="Home.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">FCOMPANION</div>
            <div class="header-actions">

                <!-- Clear Chat Button -->
<!-- Clear Chat Button with emoji -->
            <button class="clear-chat-btn" id="clearChatBtn" title="Clear chat history">
                <ion-icon name="trash-outline"></ion-icon>
            </button>

                <button class="btn theme-toggle" id="themeToggle">
                    <span id="themeIcon"><ion-icon name="moon"></ion-icon></span>
                </button>

                <div class="profile-menu">
                    <div class="profile-picture" id="profilePicture">T</div>
                    <div class="profile-dropdown" id="profileDropdown">
                        <div class="dropdown-header">
                            <p id="userName">Timon</p>
                            <span id="userEmail">timon@nileuniversity.edu.ng</span>
                        </div>
                        <div class="dropdown-item" id="profileBtn">
                            <span class="dropdown-item-icon"><ion-icon name="person"></ion-icon></span>
                            <span>Your Profile</span>
                        </div>
                        <div class="dropdown-item danger" id="logoutBtn">
                            <span class="dropdown-item-icon"><ion-icon name="log-out"></ion-icon></span>
                            <span>Log Out</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="avatar"></div>

            <div class="welcome-text" id="welcomeText">
                <h1>Welcome, <span class="name" id="welcomeName"></span></h1>
                <p class="subtitle">What would you like to learn today?</p>
            </div>

            <div class="chat-container">
                <div id="chatbox" class="chatbox"></div>
                <div class="chat-input-area">
                    <input
                        type="text"
                        id="searchInput"
                        class="chat-input"
                        placeholder="Ask about your faculty, courses, or anything..."
                    >
                    <button id="sendBtn" class="send-btn">
                        <span>➤</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="clearModal">
        <div class="modal-card">
            <div class="modal-icon">🗑️</div>
            <h2>Clear Chat History?</h2>
            <p>This will permanently delete all your previous messages. This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="cancelClear">Cancel</button>
                <button class="modal-btn confirm" id="confirmClear">Yes, Clear</button>
            </div>
        </div>
    </div>

    <script src="Home.js"></script>
</body>
</html>
